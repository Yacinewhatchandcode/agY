<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity AI Studio - Language Chains</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%23ef4444'/%3E%3Cpath d='M12 5l5.2 9H6.8L12 5z' fill='white'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="/static/antigravity_minimal.css?v=20260312h">
</head>

<body>
    <div class="top-bar">
        <div class="agent-status">
            <div class="status-dot"></div>
            <span id="agentStatus">Agent Active</span>
        </div>
        <div class="url-bar">
            <input type="text" id="urlInput" placeholder="Enter URL to navigate..."
                value="https://python.langchain.com">
            <button id="navigateBtn">Go</button>
        </div>
        <div class="cmd-bar">
            <input type="text" id="commandInput" placeholder='Command (ex: search langchain agents)'>
            <button id="runCommandBtn">Run</button>
        </div>
        <div class="current-thought" id="currentThought">
            Ready to explore...
        </div>
        <div class="controls">
            <button class="control-btn" id="refreshBtn" title="Refresh View">Refresh</button>
            <button class="control-btn" id="analyzeBtn" title="Run Backend Analysis">Analyze</button>
            <button class="control-btn" id="pauseBtn" title="Toggle Voice Mode">Voice</button>
        </div>
    </div>

    <div class="browser-container">
        <div class="browser-content" id="browserContent">
            <div class="loading-placeholder">
                <div class="spinner"></div>
                <p>Loading browser...</p>
            </div>
        </div>

        <div class="element-highlight" id="elementHighlight"></div>

        <div class="backend-panel">
            <div class="backend-header">Backend Stream</div>
            <div class="thought-log" id="thoughtLog"></div>
        </div>
    </div>

    <script src="/static/antigravity_minimal.js?v=20260312h"></script>
</body>

</html>
